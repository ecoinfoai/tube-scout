site_name: Tube Scout
site_description: >-
  A toolkit for university lecture-video pipelines: cross-faculty duplication
  detection, transcript-driven CQI support, and YouTube caption extraction
  for downstream data consumers.
site_url: https://ecoinfoai.github.io/tube-scout/
repo_url: https://github.com/ecoinfoai/tube-scout
repo_name: ecoinfoai/tube-scout
edit_uri: edit/master/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/toggle-switch
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Use cases:
      - Duplication detection: use-cases/01-duplication-detection.md
      - CQI support: use-cases/02-cqi-support.md
      - Caption extraction: use-cases/03-caption-extraction.md
  - Tutorial: tutorial.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ecoinfoai/tube-scout
